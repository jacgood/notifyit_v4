<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnCall Alert Manager - Offline</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    h1 {
      color: #DC2626;
      font-size: 24px;
      margin-bottom: 16px;
    }
    p {
      color: #9CA3AF;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
        d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414">
      </path>
    </svg>
    <h1>You're Offline</h1>
    <p>OnCall Alert Manager requires an internet connection to receive and manage alerts. Please check your connection and try again.</p>
    <p>Your pending alerts will sync once you're back online.</p>
    <button onclick="window.location.reload()" style="margin-top: 20px; padding: 10px 20px; background-color: #DC2626; color: white; border: none; border-radius: 8px; cursor: pointer;">
      Retry Connection
    </button>
  </div>
</body>
</html>
